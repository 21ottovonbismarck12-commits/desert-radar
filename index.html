<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desert Radar - Gulf War</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            color: #0f0;
        }

        #game-container {
            position: relative;
            width: 900px;
            height: 700px;
            border: 5px solid #0f0;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.7), inset 0 0 30px rgba(0, 255, 0, 0.2);
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: #0f0;
            text-shadow: 0 0 10px #0f0, 0 0 20px rgba(0, 255, 0, 0.5);
            font-size: 16px;
            line-height: 1.8;
        }

        .stat-line {
            font-size: 14px;
            margin: 8px 0;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #score { font-size: 18px; color: #fff; }
        #round { font-size: 14px; }
        #timer { font-size: 14px; color: #ffff00; }
        #threats { font-size: 14px; color: #ff6600; }
        #health { font-size: 14px; color: #ff0000; }
        #points { font-size: 16px; color: #00ff00; font-weight: bold; }

        #threat-list {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            font-size: 12px;
            max-width: 200px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #0f0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
        }

        .threat-item {
            margin: 4px 0;
            padding: 4px;
            border-left: 3px solid #0f0;
            padding-left: 8px;
        }

        .threat-jet { border-left-color: #ff0000; }
        .threat-missile { border-left-color: #ff9900; }
        .threat-tank { border-left-color: #ffff00; }

        #shop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        #shop-overlay.active {
            display: flex;
        }

        #shop-content {
            background: rgba(0, 20, 0, 0.9);
            border: 3px solid #0f0;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            text-align: center;
        }

        #shop-content h1 {
            font-size: 28px;
            color: #0f0;
            text-shadow: 0 0 20px #0f0;
            margin-bottom: 20px;
        }

        #shop-points-display {
            font-size: 20px;
            color: #ffff00;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #ffff00;
        }

        #shop-items {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .shop-item {
            background: rgba(0, 50, 0, 0.8);
            border: 2px solid #0f0;
            padding: 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .shop-item:hover {
            background: rgba(0, 100, 0, 0.8);
            box-shadow: 0 0 15px #0f0;
            transform: scale(1.05);
        }

        .shop-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .shop-item.disabled:hover {
            transform: scale(1);
            box-shadow: none;
        }

        .shop-item h3 {
            color: #0f0;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .shop-item p {
            color: #0f0;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .shop-price {
            color: #ffff00;
            font-size: 14px;
            font-weight: bold;
        }

        #shop-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .shop-button {
            padding: 12px 30px;
            font-size: 14px;
            background: #0f0;
            color: #000;
            border: 2px solid #0f0;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }

        .shop-button:hover {
            background: #00ff00;
            box-shadow: 0 0 20px #0f0;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.98);
            padding: 40px;
            text-align: center;
            border: 4px solid #f00;
            border-radius: 10px;
            z-index: 100;
            display: none;
            color: #0f0;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.7);
        }

        #game-over h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #f00;
            text-shadow: 0 0 20px #f00, 0 0 40px rgba(255, 0, 0, 0.5);
        }

        #game-over p {
            font-size: 16px;
            margin: 10px 0;
        }

        #game-over button {
            margin-top: 20px;
            padding: 12px 40px;
            font-size: 16px;
            background: #0f0;
            color: #000;
            border: 2px solid #0f0;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }

        #game-over button:hover {
            background: #00ff00;
            box-shadow: 0 0 20px #0f0;
        }

        #instructions {
            position: absolute;
            bottom: 10px;
            left: 20px;
            right: 20px;
            font-size: 12px;
            color: #0f0;
            opacity: 0.8;
            text-align: center;
        }

        /* Scrollbar styling */
        #threat-list::-webkit-scrollbar {
            width: 8px;
        }

        #threat-list::-webkit-scrollbar-track {
            background: rgba(0, 255, 0, 0.1);
        }

        #threat-list::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="radarCanvas"></canvas>
        <div id="ui">
            <div id="score" class="stat-line">PUNTOS TOTALES: 0</div>
            <div id="points" class="stat-line">PUNTOS RONDA: 0</div>
            <div id="round" class="stat-line">RONDA: 1</div>
            <div id="timer" class="stat-line">TIEMPO: 20s</div>
            <div id="threats" class="stat-line">AMENAZAS: 0</div>
            <div id="health" class="stat-line">DEFENSA: 100%</div>
        </div>
        <div id="threat-list">
            <div style="text-align: center; color: #ff6600; margin-bottom: 8px; border-bottom: 1px solid #0f0; padding-bottom: 5px;">CONTACTOS ACTIVOS</div>
            <div id="threats-detail"></div>
        </div>
        <div id="shop-overlay">
            <div id="shop-content">
                <h1>⚔️ TIENDA DE DEFENSAS ⚔️</h1>
                <div id="shop-points-display">PUNTOS DISPONIBLES: 0</div>
                <div id="shop-items"></div>
                <div id="shop-buttons">
                    <button class="shop-button" onclick="continueGame()">CONTINUAR RONDA</button>
                </div>
            </div>
        </div>
        <div id="instructions">
            CLICK EN RADAR = Dirigir tropas | ESPACIO = Pausa | R = Reiniciar
        </div>
        <div id="game-over">
            <h1>MISIÓN FALLIDA</h1>
            <p id="final-score">Puntuación Final: 0</p>
            <p id="final-round">Rondas Completadas: 0</p>
            <button onclick="location.reload()">REINTENTAR MISIÓN</button>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Definiciones de defensas
        const DEFENSES = {
            GUN: {
                name: 'Cañón AA',
                cost: 50,
                description: 'Dispara a Jets/Misiles',
                range: 100,
                damage: 2,
                fireRate: 0.5
            },
            MISSILE: {
                name: 'Lanzador Misiles',
                cost: 80,
                description: 'Destruye grupos de tanques',
                range: 150,
                damage: 5,
                fireRate: 1
            },
            SHIELD: {
                name: 'Escudo de Energía',
                cost: 120,
                description: 'Bloquea 1 ataque crítico',
                absorption: 50,
                duration: 30
            }
        };

        let gameState = {
            score: 0,
            roundPoints: 0,
            round: 1,
            roundTime: 20,
            roundTimeRemaining: 20,
            health: 100,
            maxHealth: 100,
            threats: 0,
            gameOver: false,
            paused: false,
            selectedTarget: null,
            radarCenter: { x: canvas.width / 2, y: canvas.height / 2 },
            radarRadius: Math.min(canvas.width, canvas.height) / 2 - 60,
            radarSweep: 0,
            roundActive: false,
            inShop: false,
            defenses: [],
            roundStartTime: 0
        };

        let enemies = [];
        let projectiles = [];
        let floatingPoints = [];
        let squadrons = {}; // Agrupar enemigos por squadrón

        const ENEMY_TYPES = {
            JET: { speed: 60, health: 1, color: '#ff0000', symbol: '✈', threat: 30, points: 2 },
            MISSILE: { speed: 80, health: 1, color: '#ff9900', symbol: '➤', threat: 50, points: 3 },
            TANK: { speed: 30, health: 3, color: '#ffff00', symbol: '⬛', threat: 20, points: 1 }
        };

        const TANK_FORMATIONS = {
            WEDGE: [
                { x: 0, y: 0 },
                { x: 30, y: -20 },
                { x: 30, y: 20 },
                { x: 60, y: -35 },
                { x: 60, y: 35 }
            ],
            LINE: [
                { x: 0, y: -25 },
                { x: 0, y: 0 },
                { x: 0, y: 25 },
                { x: 0, y: -50 },
                { x: 0, y: 50 }
            ],
            COLUMN: [
                { x: 0, y: 0 },
                { x: -25, y: 0 },
                { x: 25, y: 0 },
                { x: -50, y: 0 },
                { x: 50, y: 0 }
            ],
            DIAMOND: [
                { x: 0, y: 0 },
                { x: 30, y: 0 },
                { x: -30, y: 0 },
                { x: 0, y: 30 },
                { x: 0, y: -30 }
            ]
        };

        function animateRadarSweep() {
            gameState.radarSweep = (gameState.radarSweep + 2) % 360;
        }

        function drawRadar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#001a00';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Radar circles
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.8;

            ctx.beginPath();
            ctx.arc(gameState.radarCenter.x, gameState.radarCenter.y, gameState.radarRadius, 0, Math.PI * 2);
            ctx.stroke();

            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.5;
            for (let i = 1; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(gameState.radarCenter.x, gameState.radarCenter.y, (gameState.radarRadius / 5) * i, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Compass lines
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.4;
            ctx.beginPath();
            ctx.moveTo(gameState.radarCenter.x - gameState.radarRadius, gameState.radarCenter.y);
            ctx.lineTo(gameState.radarCenter.x + gameState.radarRadius, gameState.radarCenter.y);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(gameState.radarCenter.x, gameState.radarCenter.y - gameState.radarRadius);
            ctx.lineTo(gameState.radarCenter.x, gameState.radarCenter.y + gameState.radarRadius);
            ctx.stroke();

            // Diagonal lines
            const diagDist = gameState.radarRadius / Math.sqrt(2);
            ctx.globalAlpha = 0.2;
            ctx.beginPath();
            ctx.moveTo(gameState.radarCenter.x - diagDist, gameState.radarCenter.y - diagDist);
            ctx.lineTo(gameState.radarCenter.x + diagDist, gameState.radarCenter.y + diagDist);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(gameState.radarCenter.x + diagDist, gameState.radarCenter.y - diagDist);
            ctx.lineTo(gameState.radarCenter.x - diagDist, gameState.radarCenter.y + diagDist);
            ctx.stroke();

            // Radar sweep
            ctx.globalAlpha = 0.6;
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            const sweepAngle = (gameState.radarSweep * Math.PI) / 180;
            const sweepX = gameState.radarCenter.x + Math.cos(sweepAngle) * gameState.radarRadius;
            const sweepY = gameState.radarCenter.y + Math.sin(sweepAngle) * gameState.radarRadius;
            ctx.beginPath();
            ctx.moveTo(gameState.radarCenter.x, gameState.radarCenter.y);
            ctx.lineTo(sweepX, sweepY);
            ctx.stroke();

            ctx.globalAlpha = 0.1;
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(gameState.radarCenter.x, gameState.radarCenter.y, gameState.radarRadius, sweepAngle - 0.3, sweepAngle);
            ctx.lineTo(gameState.radarCenter.x, gameState.radarCenter.y);
            ctx.fill();

            // Center point
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(gameState.radarCenter.x, gameState.radarCenter.y, 6, 0, Math.PI * 2);
            ctx.fill();

            // Direction labels
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 14px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('N', gameState.radarCenter.x, gameState.radarCenter.y - gameState.radarRadius - 20);
            ctx.fillText('S', gameState.radarCenter.x, gameState.radarCenter.y + gameState.radarRadius + 20);
            ctx.textAlign = 'right';
            ctx.fillText('O', gameState.radarCenter.x - gameState.radarRadius - 20, gameState.radarCenter.y);
            ctx.textAlign = 'left';
            ctx.fillText('E', gameState.radarCenter.x + gameState.radarRadius + 20, gameState.radarCenter.y);

            // Draw squadrons as groups
            ctx.globalAlpha = 0.9;
            for (let squadronId in squadrons) {
                let squadron = squadrons[squadronId];
                if (squadron.enemies.length === 0) continue;

                let avgX = 0, avgY = 0;
                squadron.enemies.forEach(enemy => {
                    avgX += enemy.x;
                    avgY += enemy.y;
                });
                avgX /= squadron.enemies.length;
                avgY /= squadron.enemies.length;

                ctx.fillStyle = squadron.color;
                ctx.strokeStyle = squadron.color;
                ctx.lineWidth = 2;

                // Squadron symbol
                ctx.font = 'bold 20px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(squadron.symbol, avgX, avgY);

                // Squadron circle
                ctx.globalAlpha = 0.3;
                ctx.beginPath();
                ctx.arc(avgX, avgY, 25, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 0.9;

                // Squadron label
                ctx.globalAlpha = 0.6;
                ctx.fillStyle = squadron.color;
                ctx.font = 'bold 10px Courier New';
                ctx.fillText(`${squadron.type}(${squadron.enemies.length})`, avgX, avgY + 35);
                ctx.globalAlpha = 0.9;
            }

            // Draw projectiles
            ctx.fillStyle = '#00ff00';
            ctx.globalAlpha = 1;
            projectiles.forEach(proj => {
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, 7, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            });

            // Draw floating points
            ctx.globalAlpha = 1;
            floatingPoints.forEach((point, idx) => {
                ctx.fillStyle = point.color;
                ctx.font = 'bold 16px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(`+${point.value}`, point.x, point.y);
            });

            // Draw defenses
            ctx.globalAlpha = 0.7;
            gameState.defenses.forEach(defense => {
                ctx.fillStyle = defense.type === 'SHIELD' ? '#0099ff' : '#00ff00';
                ctx.beginPath();
                ctx.arc(defense.x, defense.y, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = ctx.fillStyle;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(defense.x, defense.y, defense.range, 0, Math.PI * 2);
                ctx.stroke();
            });

            ctx.globalAlpha = 1;
        }

        function updateSquadrons() {
            squadrons = {};
            enemies.forEach(enemy => {
                if (!squadrons[enemy.squadronId]) {
                    squadrons[enemy.squadronId] = {
                        enemies: [],
                        type: enemy.type,
                        color: enemy.color,
                        symbol: enemy.symbol
                    };
                }
                squadrons[enemy.squadronId].enemies.push(enemy);
            });
        }

        function update() {
            if (gameState.gameOver || gameState.paused || !gameState.roundActive) return;

            animateRadarSweep();

            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                enemy.x += Math.cos(enemy.angle) * enemy.speed * 0.016;
                enemy.y += Math.sin(enemy.angle) * enemy.speed * 0.016;

                let dist = Math.hypot(enemy.x - gameState.radarCenter.x, enemy.y - gameState.radarCenter.y);

                if (dist > gameState.radarRadius + 80) {
                    enemies.splice(i, 1);
                    gameState.threats--;
                    continue;
                }

                if (enemy.type === 'MISSILE' && dist < 50) {
                    damageBase(gameState.maxHealth * 0.35);
                    createFloatingPoint(enemy.x, enemy.y, ENEMY_TYPES[enemy.type].points, '#ffff00');
                    gameState.roundPoints += ENEMY_TYPES[enemy.type].points;
                    enemies.splice(i, 1);
                    gameState.threats--;
                    playExplosionSound();
                    continue;
                }
            }

            // Update projectiles from player
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let proj = projectiles[i];
                proj.x += Math.cos(proj.angle) * proj.speed * 0.016;
                proj.y += Math.sin(proj.angle) * proj.speed * 0.016;

                let hit = false;
                for (let e = enemies.length - 1; e >= 0; e--) {
                    let enemy = enemies[e];
                    let d = Math.hypot(proj.x - enemy.x, proj.y - enemy.y);
                    if (d < 25) {
                        enemy.health--;
                        hit = true;
                        playHitSound();

                        if (enemy.health <= 0) {
                            gameState.score += ENEMY_TYPES[enemy.type].threat * 10;
                            createFloatingPoint(enemy.x, enemy.y, ENEMY_TYPES[enemy.type].points, '#ffff00');
                            gameState.roundPoints += ENEMY_TYPES[enemy.type].points;
                            enemies.splice(e, 1);
                            gameState.threats--;
                            playKillSound();
                        }
                        break;
                    }
                }

                if (hit) {
                    projectiles.splice(i, 1);
                    continue;
                }

                if (proj.x < 0 || proj.x > canvas.width || proj.y < 0 || proj.y > canvas.height) {
                    projectiles.splice(i, 1);
                }
            }

            // Update floating points
            floatingPoints = floatingPoints.filter(point => {
                point.y -= 1;
                point.life--;
                return point.life > 0;
            });

            updateSquadrons();
            updateUI();
            drawRadar();
        }

        function updateUI() {
            document.getElementById('score').textContent = `PUNTOS TOTALES: ${gameState.score}`;
            document.getElementById('points').textContent = `PUNTOS RONDA: ${gameState.roundPoints}`;
            document.getElementById('round').textContent = `RONDA: ${gameState.round}`;
            document.getElementById('timer').textContent = `TIEMPO: ${Math.ceil(gameState.roundTimeRemaining)}s`;
            document.getElementById('threats').textContent = `AMENAZAS: ${enemies.length}`;
            document.getElementById('health').textContent = `DEFENSA: ${Math.max(0, Math.floor(gameState.health))}%`;

            let healthColor = gameState.health > 50 ? '#0f0' : gameState.health > 25 ? '#ff6600' : '#f00';
            document.getElementById('health').style.color = healthColor;

            // Update threats list - mostrar squadrones como grupos
            let threatsList = document.getElementById('threats-detail');
            threatsList.innerHTML = '';
            
            for (let squadronId in squadrons) {
                let squadron = squadrons[squadronId];
                let threatDiv = document.createElement('div');
                threatDiv.className = `threat-item threat-${squadron.type.toLowerCase()}`;
                threatDiv.textContent = `${squadron.symbol} ${squadron.type} (${squadron.enemies.length})`;
                threatsList.appendChild(threatDiv);
            }
        }

        function createFloatingPoint(x, y, value, color) {
            floatingPoints.push({
                x: x,
                y: y,
                value: value,
                color: color,
                life: 60
            });
        }

        function spawnTankSquadron(angle, distance, squadronId) {
            const formationNames = Object.keys(TANK_FORMATIONS);
            const formationType = formationNames[Math.floor(Math.random() * formationNames.length)];
            const formation = TANK_FORMATIONS[formationType];

            const leaderX = gameState.radarCenter.x + Math.cos(angle) * distance;
            const leaderY = gameState.radarCenter.y + Math.sin(angle) * distance;

            formation.forEach((pos, idx) => {
                const rotatedX = pos.x * Math.cos(angle + Math.PI) - pos.y * Math.sin(angle + Math.PI);
                const rotatedY = pos.x * Math.sin(angle + Math.PI) + pos.y * Math.cos(angle + Math.PI);

                let tank = {
                    x: leaderX + rotatedX,
                    y: leaderY + rotatedY,
                    type: 'TANK',
                    angle: angle + Math.PI + (Math.random() - 0.5) * 0.1,
                    speed: ENEMY_TYPES['TANK'].speed,
                    health: ENEMY_TYPES['TANK'].health,
                    color: ENEMY_TYPES['TANK'].color,
                    symbol: ENEMY_TYPES['TANK'].symbol,
                    squadronId: squadronId,
                    groupLeader: idx === 0,
                    leaderX: leaderX,
                    leaderY: leaderY,
                    formation: formationType
                };

                enemies.push(tank);
                gameState.threats++;
            });

            playRadarSound();
        }

        function spawnWave() {
            if (!gameState.roundActive) return;

            let squadronCount = 0;

            // Jets
            const jetCount = Math.ceil(gameState.round / 2);
            for (let i = 0; i < jetCount; i++) {
                let angle = Math.random() * Math.PI * 2;
                let distance = gameState.radarRadius - 30;
                let x = gameState.radarCenter.x + Math.cos(angle) * distance;
                let y = gameState.radarCenter.y + Math.sin(angle) * distance;

                let jet = {
                    x: x,
                    y: y,
                    type: 'JET',
                    angle: angle + Math.PI + (Math.random() - 0.5) * 0.3,
                    speed: ENEMY_TYPES['JET'].speed,
                    health: ENEMY_TYPES['JET'].health,
                    color: ENEMY_TYPES['JET'].color,
                    symbol: ENEMY_TYPES['JET'].symbol,
                    squadronId: `JET-${squadronCount++}`
                };

                enemies.push(jet);
                gameState.threats++;
                playRadarSound();
            }

            // Missiles
            const missileCount = Math.ceil(gameState.round / 3);
            for (let i = 0; i < missileCount; i++) {
                let angle = Math.random() * Math.PI * 2;
                let distance = gameState.radarRadius - 30;
                let x = gameState.radarCenter.x + Math.cos(angle) * distance;
                let y = gameState.radarCenter.y + Math.sin(angle) * distance;

                let missile = {
                    x: x,
                    y: y,
                    type: 'MISSILE',
                    angle: angle + Math.PI + (Math.random() - 0.5) * 0.3,
                    speed: ENEMY_TYPES['MISSILE'].speed,
                    health: ENEMY_TYPES['MISSILE'].health,
                    color: ENEMY_TYPES['MISSILE'].color,
                    symbol: ENEMY_TYPES['MISSILE'].symbol,
                    squadronId: `MISSILE-${squadronCount++}`
                };

                enemies.push(missile);
                gameState.threats++;
                playRadarSound();
            }

            // Tank squadrons
            const tankGroupCount = Math.ceil(gameState.round / 2);
            for (let i = 0; i < tankGroupCount; i++) {
                let angle = Math.random() * Math.PI * 2;
                let distance = gameState.radarRadius - 30;
                spawnTankSquadron(angle, distance, `TANK-${squadronCount++}`);
            }
        }

        function handleRadarClick(e) {
            if (gameState.gameOver || gameState.paused || !gameState.roundActive) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            let dx = x - gameState.radarCenter.x;
            let dy = y - gameState.radarCenter.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < gameState.radarRadius) {
                let targetEnemy = null;
                let minDist = 40;

                enemies.forEach(enemy => {
                    let d = Math.hypot(x - enemy.x, y - enemy.y);
                    if (d < minDist) {
                        targetEnemy = enemy;
                        minDist = d;
                    }
                });

                if (targetEnemy) {
                    gameState.selectedTarget = targetEnemy;
                    fireProjectile(gameState.radarCenter.x, gameState.radarCenter.y, targetEnemy.x, targetEnemy.y);
                    playFireSound();
                }
            }
        }

        function fireProjectile(fromX, fromY, toX, toY) {
            let angle = Math.atan2(toY - fromY, toX - fromX);
            projectiles.push({
                x: fromX,
                y: fromY,
                angle: angle,
                speed: 350
            });
        }

        function damageBase(amount) {
            gameState.health -= amount;
            if (gameState.health <= 0) {
                endRound();
            }
        }

        function startRound() {
            gameState.roundActive = true;
            gameState.roundTimeRemaining = gameState.roundTime;
            gameState.roundStartTime = Date.now();
            gameState.inShop = false;
            document.getElementById('shop-overlay').classList.remove('active');
            enemies = [];
            projectiles = [];
            gameState.threats = 0;
            updateSquadrons();
            spawnWave();
        }

        function endRound() {
            gameState.roundActive = false;
            if (gameState.health <= 0) {
                endGame();
            } else {
                showShop();
            }
        }

        function showShop() {
            gameState.inShop = true;
            const overlay = document.getElementById('shop-overlay');
            overlay.classList.add('active');

            document.getElementById('shop-points-display').textContent = 
                `PUNTOS DISPONIBLES: ${gameState.roundPoints}`;

            const shopItems = document.getElementById('shop-items');
            shopItems.innerHTML = '';

            for (let defenseKey in DEFENSES) {
                let defense = DEFENSES[defenseKey];
                let canAfford = gameState.roundPoints >= defense.cost;
                
                let item = document.createElement('div');
                item.className = `shop-item ${!canAfford ? 'disabled' : ''}`;
                item.innerHTML = `
                    <h3>${defense.name}</h3>
                    <p>${defense.description}</p>
                    <div class="shop-price">Costo: ${defense.cost} puntos</div>
                `;
                
                if (canAfford) {
                    item.onclick = () => buyDefense(defenseKey);
                    item.style.cursor = 'pointer';
                }
                
                shopItems.appendChild(item);
            }
        }

        function buyDefense(defenseKey) {
            let defense = DEFENSES[defenseKey];
            if (gameState.roundPoints >= defense.cost) {
                gameState.roundPoints -= defense.cost;
                gameState.score += defense.cost;
                
                // Add defense to base
                gameState.defenses.push({
                    type: defenseKey,
                    x: gameState.radarCenter.x + (Math.random() - 0.5) * 60,
                    y: gameState.radarCenter.y + (Math.random() - 0.5) * 60,
                    ...defense
                });

                document.getElementById('shop-points-display').textContent = 
                    `PUNTOS DISPONIBLES: ${gameState.roundPoints}`;

                playFireSound();
            }
        }

        function continueGame() {
            gameState.round++;
            gameState.roundTime *= 1.1; // Add 10%
            gameState.health = Math.min(100, gameState.health + 10); // Heal 10% per round
            gameState.roundPoints = 0;
            startRound();
        }

        function endGame() {
            gameState.gameOver = true;
            gameState.roundActive = false;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').textContent = `Puntuación Final: ${gameState.score}`;
            document.getElementById('final-round').textContent = `Rondas Completadas: ${gameState.round - 1}`;
            playGameOverSound();
        }

        function togglePause() {
            gameState.paused = !gameState.paused;
        }

        // Audio
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(frequency, duration, type = 'sine') {
            if (!audioContext) return;
            
            try {
                let now = audioContext.currentTime;
                let osc = audioContext.createOscillator();
                let gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.value = frequency;
                osc.type = type;
                
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                
                osc.start(now);
                osc.stop(now + duration);
            } catch (e) {
                console.log('Audio error:', e);
            }
        }

        function playRadarSound() { playSound(800, 0.1); }
        function playFireSound() { playSound(1200, 0.15); }
        function playHitSound() { playSound(1500, 0.08); }
        function playKillSound() { playSound(2000, 0.25, 'square'); }
        function playExplosionSound() { playSound(400, 0.4, 'square'); }
        function playGameOverSound() { playSound(200, 0.6); }

        // Event listeners
        canvas.addEventListener('click', handleRadarClick);
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                togglePause();
            }
            if (e.key.toLowerCase() === 'r') {
                location.reload();
            }
        });

        // Game loop
        function gameLoop() {
            if (gameState.roundActive && !gameState.paused) {
                gameState.roundTimeRemaining = gameState.roundTime - (Date.now() - gameState.roundStartTime) / 1000;
                
                if (gameState.roundTimeRemaining <= 0) {
                    endRound();
                }
            }
            
            update();
            requestAnimationFrame(gameLoop);
        }

        // Init
        window.addEventListener('load', () => {
            initAudio();
            startRound();
            gameLoop();
        });
    </script>
</body>
</html>
