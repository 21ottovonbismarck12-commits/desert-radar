<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desert Radar - Gulf War</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            color: #0f0;
        }

        #game-container {
            position: relative;
            width: 900px;
            height: 700px;
            border: 5px solid #0f0;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.7), inset 0 0 30px rgba(0, 255, 0, 0.2);
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: #0f0;
            text-shadow: 0 0 10px #0f0, 0 0 20px rgba(0, 255, 0, 0.5);
            font-size: 16px;
            line-height: 1.6;
        }

        .stat-line {
            font-size: 14px;
            margin: 8px 0;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #score { font-size: 18px; color: #fff; }
        #wave { font-size: 14px; }
        #threats { font-size: 14px; color: #ff6600; }
        #health { font-size: 14px; color: #ff0000; }

        #threat-list {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            font-size: 12px;
            max-width: 200px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #0f0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
        }

        .threat-item {
            margin: 4px 0;
            padding: 4px;
            border-left: 3px solid #0f0;
            padding-left: 8px;
        }

        .threat-jet { border-left-color: #ff0000; }
        .threat-missile { border-left-color: #ff9900; }
        .threat-tank { border-left-color: #ffff00; }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.98);
            padding: 40px;
            text-align: center;
            border: 4px solid #f00;
            border-radius: 10px;
            z-index: 100;
            display: none;
            color: #0f0;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.7);
        }

        #game-over h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #f00;
            text-shadow: 0 0 20px #f00, 0 0 40px rgba(255, 0, 0, 0.5);
        }

        #game-over p {
            font-size: 16px;
            margin: 10px 0;
        }

        #game-over button {
            margin-top: 20px;
            padding: 12px 40px;
            font-size: 16px;
            background: #0f0;
            color: #000;
            border: 2px solid #0f0;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }

        #game-over button:hover {
            background: #00ff00;
            box-shadow: 0 0 20px #0f0;
        }

        #instructions {
            position: absolute;
            bottom: 10px;
            left: 20px;
            right: 20px;
            font-size: 12px;
            color: #0f0;
            opacity: 0.8;
            text-align: center;
        }

        /* Scrollbar styling */
        #threat-list::-webkit-scrollbar {
            width: 8px;
        }

        #threat-list::-webkit-scrollbar-track {
            background: rgba(0, 255, 0, 0.1);
        }

        #threat-list::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="radarCanvas"></canvas>
        <div id="ui">
            <div id="score" class="stat-line">PUNTOS: 0</div>
            <div id="wave" class="stat-line">OLEADA: 1</div>
            <div id="threats" class="stat-line">AMENAZAS: 0</div>
            <div id="health" class="stat-line">DEFENSA: 100%</div>
        </div>
        <div id="threat-list">
            <div style="text-align: center; color: #ff6600; margin-bottom: 8px; border-bottom: 1px solid #0f0; padding-bottom: 5px;">CONTACTOS ACTIVOS</div>
            <div id="threats-detail"></div>
        </div>
        <div id="instructions">
            CLICK EN RADAR = Dirigir tropas | ESPACIO = Pausa | R = Reiniciar
        </div>
        <div id="game-over">
            <h1>MISIÓN FALLIDA</h1>
            <p id="final-score">Puntuación Final: 0</p>
            <p id="final-wave">Oleadas Completadas: 0</p>
            <button onclick="location.reload()">REINTENTAR MISIÓN</button>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        
        // Ajustar canvas a su tamaño visual
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let gameState = {
            score: 0,
            wave: 1,
            health: 100,
            maxHealth: 100,
            threats: 0,
            gameOver: false,
            paused: false,
            selectedTarget: null,
            radarCenter: { x: canvas.width / 2, y: canvas.height / 2 },
            radarRadius: Math.min(canvas.width, canvas.height) / 2 - 60,
            radarSweep: 0
        };

        let enemies = [];
        let projectiles = [];

        const ENEMY_TYPES = {
            JET: { speed: 60, health: 1, color: '#ff0000', symbol: '✈', threat: 30 },
            MISSILE: { speed: 80, health: 1, color: '#ff9900', symbol: '➤', threat: 50 },
            TANK: { speed: 30, health: 3, color: '#ffff00', symbol: '⬛', threat: 20 }
        };

        // Animación del sweep del radar
        function animateRadarSweep() {
            gameState.radarSweep = (gameState.radarSweep + 2) % 360;
        }

        function drawRadar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Fondo oscuro
            ctx.fillStyle = '#001a00';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Círculos concéntricos del radar
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.8;

            // Círculo exterior
            ctx.beginPath();
            ctx.arc(gameState.radarCenter.x, gameState.radarCenter.y, gameState.radarRadius, 0, Math.PI * 2);
            ctx.stroke();

            // Círculos interiores
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.5;
            for (let i = 1; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(gameState.radarCenter.x, gameState.radarCenter.y, (gameState.radarRadius / 5) * i, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Líneas de compass (N, S, E, W)
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.4;
            ctx.beginPath();
            ctx.moveTo(gameState.radarCenter.x - gameState.radarRadius, gameState.radarCenter.y);
            ctx.lineTo(gameState.radarCenter.x + gameState.radarRadius, gameState.radarCenter.y);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(gameState.radarCenter.x, gameState.radarCenter.y - gameState.radarRadius);
            ctx.lineTo(gameState.radarCenter.x, gameState.radarCenter.y + gameState.radarRadius);
            ctx.stroke();

            // Líneas diagonales
            const diagDist = gameState.radarRadius / Math.sqrt(2);
            ctx.globalAlpha = 0.2;
            ctx.beginPath();
            ctx.moveTo(gameState.radarCenter.x - diagDist, gameState.radarCenter.y - diagDist);
            ctx.lineTo(gameState.radarCenter.x + diagDist, gameState.radarCenter.y + diagDist);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(gameState.radarCenter.x + diagDist, gameState.radarCenter.y - diagDist);
            ctx.lineTo(gameState.radarCenter.x - diagDist, gameState.radarCenter.y + diagDist);
            ctx.stroke();

            // Sweep del radar (línea verde giratoria)
            ctx.globalAlpha = 0.6;
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            const sweepAngle = (gameState.radarSweep * Math.PI) / 180;
            const sweepX = gameState.radarCenter.x + Math.cos(sweepAngle) * gameState.radarRadius;
            const sweepY = gameState.radarCenter.y + Math.sin(sweepAngle) * gameState.radarRadius;
            ctx.beginPath();
            ctx.moveTo(gameState.radarCenter.x, gameState.radarCenter.y);
            ctx.lineTo(sweepX, sweepY);
            ctx.stroke();

            // Área de sweep (efecto de barrido)
            ctx.globalAlpha = 0.1;
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(gameState.radarCenter.x, gameState.radarCenter.y, gameState.radarRadius, sweepAngle - 0.3, sweepAngle);
            ctx.lineTo(gameState.radarCenter.x, gameState.radarCenter.y);
            ctx.fill();

            // Centro del radar
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(gameState.radarCenter.x, gameState.radarCenter.y, 6, 0, Math.PI * 2);
            ctx.fill();

            // Etiquetas de dirección
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 14px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('N', gameState.radarCenter.x, gameState.radarCenter.y - gameState.radarRadius - 20);
            ctx.fillText('S', gameState.radarCenter.x, gameState.radarCenter.y + gameState.radarRadius + 20);
            ctx.textAlign = 'right';
            ctx.fillText('O', gameState.radarCenter.x - gameState.radarRadius - 20, gameState.radarCenter.y);
            ctx.textAlign = 'left';
            ctx.fillText('E', gameState.radarCenter.x + gameState.radarRadius + 20, gameState.radarCenter.y);

            // Dibujar enemigos
            ctx.globalAlpha = 0.9;
            enemies.forEach((enemy, idx) => {
                ctx.fillStyle = enemy.color;
                ctx.strokeStyle = enemy.color;
                ctx.lineWidth = 2;

                // Símbolo del tipo de enemigo
                ctx.font = 'bold 16px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(enemy.symbol, enemy.x, enemy.y);

                // Círculo de alcance
                ctx.globalAlpha = 0.3;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, 15, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 0.9;
            });

            // Dibujar proyectiles
            ctx.fillStyle = '#00ff00';
            ctx.globalAlpha = 1;
            projectiles.forEach(proj => {
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, 4, 0, Math.PI * 2);
                ctx.fill();

                // Estela
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, 7, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            });

            // Línea de targeting si hay objetivo seleccionado
            if (gameState.selectedTarget) {
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.5;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(gameState.radarCenter.x, gameState.radarCenter.y);
                ctx.lineTo(gameState.selectedTarget.x, gameState.selectedTarget.y);
                ctx.stroke();
                ctx.setLineDash([]);
                gameState.selectedTarget = null;
            }

            ctx.globalAlpha = 1;
        }

        function update() {
            if (gameState.gameOver || gameState.paused) return;

            animateRadarSweep();

            // Actualizar enemigos
            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                enemy.x += Math.cos(enemy.angle) * enemy.speed * 0.016;
                enemy.y += Math.sin(enemy.angle) * enemy.speed * 0.016;

                let dist = Math.hypot(enemy.x - gameState.radarCenter.x, enemy.y - gameState.radarCenter.y);

                if (dist > gameState.radarRadius + 80) {
                    enemies.splice(i, 1);
                    gameState.threats--;
                    continue;
                }

                if (enemy.type === 'MISSILE' && dist < 50) {
                    damageBase(gameState.maxHealth * 0.35);
                    enemies.splice(i, 1);
                    gameState.threats--;
                    playExplosionSound();
                    continue;
                }
            }

            // Actualizar proyectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let proj = projectiles[i];
                proj.x += Math.cos(proj.angle) * proj.speed * 0.016;
                proj.y += Math.sin(proj.angle) * proj.speed * 0.016;

                let hit = false;
                for (let e = enemies.length - 1; e >= 0; e--) {
                    let enemy = enemies[e];
                    let d = Math.hypot(proj.x - enemy.x, proj.y - enemy.y);
                    if (d < 25) {
                        enemy.health--;
                        hit = true;
                        playHitSound();

                        if (enemy.health <= 0) {
                            gameState.score += ENEMY_TYPES[enemy.type].threat * 10;
                            enemies.splice(e, 1);
                            gameState.threats--;
                            playKillSound();
                        }
                        break;
                    }
                }

                if (hit) {
                    projectiles.splice(i, 1);
                    continue;
                }

                if (proj.x < 0 || proj.x > canvas.width || proj.y < 0 || proj.y > canvas.height) {
                    projectiles.splice(i, 1);
                }
            }

            updateUI();
            drawRadar();
        }

        function updateUI() {
            document.getElementById('score').textContent = `PUNTOS: ${gameState.score}`;
            document.getElementById('wave').textContent = `OLEADA: ${gameState.wave}`;
            document.getElementById('threats').textContent = `AMENAZAS: ${enemies.length}`;
            document.getElementById('health').textContent = `DEFENSA: ${Math.max(0, Math.floor(gameState.health))}%`;

            let healthColor = gameState.health > 50 ? '#0f0' : gameState.health > 25 ? '#ff6600' : '#f00';
            document.getElementById('health').style.color = healthColor;

            // Actualizar lista de amenazas
            let threatsList = document.getElementById('threats-detail');
            threatsList.innerHTML = '';
            enemies.forEach((enemy, idx) => {
                let threatDiv = document.createElement('div');
                threatDiv.className = `threat-item threat-${enemy.type.toLowerCase()}`;
                let dist = Math.floor(Math.hypot(enemy.x - gameState.radarCenter.x, enemy.y - gameState.radarCenter.y));
                threatDiv.textContent = `${enemy.symbol} ${enemy.type} - ${dist}km`;
                threatsList.appendChild(threatDiv);
            });
        }

        function spawnWave() {
            if (gameState.gameOver) return;

            let enemyCount = 2 + Math.floor(gameState.wave / 2);
            
            for (let i = 0; i < enemyCount; i++) {
                setTimeout(() => {
                    let rand = Math.random();
                    let type;
                    
                    if (rand < 0.35) type = 'JET';
                    else if (rand < 0.65) type = 'MISSILE';
                    else type = 'TANK';

                    let angle = Math.random() * Math.PI * 2;
                    let distance = gameState.radarRadius - 30;
                    let x = gameState.radarCenter.x + Math.cos(angle) * distance;
                    let y = gameState.radarCenter.y + Math.sin(angle) * distance;

                    let enemy = {
                        x: x,
                        y: y,
                        type: type,
                        angle: angle + Math.PI + (Math.random() - 0.5) * 0.3,
                        speed: ENEMY_TYPES[type].speed,
                        health: ENEMY_TYPES[type].health,
                        color: ENEMY_TYPES[type].color,
                        symbol: ENEMY_TYPES[type].symbol
                    };

                    enemies.push(enemy);
                    gameState.threats++;
                    playRadarSound();
                }, i * 500);
            }

            gameState.wave++;
        }

        function handleRadarClick(e) {
            if (gameState.gameOver || gameState.paused) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            let dx = x - gameState.radarCenter.x;
            let dy = y - gameState.radarCenter.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < gameState.radarRadius) {
                let targetEnemy = null;
                let minDist = 40;

                enemies.forEach(enemy => {
                    let d = Math.hypot(x - enemy.x, y - enemy.y);
                    if (d < minDist) {
                        targetEnemy = enemy;
                        minDist = d;
                    }
                });

                if (targetEnemy) {
                    gameState.selectedTarget = targetEnemy;
                    fireProjectile(gameState.radarCenter.x, gameState.radarCenter.y, targetEnemy.x, targetEnemy.y);
                    playFireSound();
                }
            }
        }

        function fireProjectile(fromX, fromY, toX, toY) {
            let angle = Math.atan2(toY - fromY, toX - fromX);
            projectiles.push({
                x: fromX,
                y: fromY,
                angle: angle,
                speed: 350
            });
        }

        function damageBase(amount) {
            gameState.health -= amount;
            if (gameState.health <= 0) {
                endGame();
            }
        }

        function endGame() {
            gameState.gameOver = true;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').textContent = `Puntuación Final: ${gameState.score}`;
            document.getElementById('final-wave').textContent = `Oleadas Completadas: ${gameState.wave - 1}`;
            playGameOverSound();
        }

        function togglePause() {
            gameState.paused = !gameState.paused;
        }

        // Sonidos con Web Audio API
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(frequency, duration, type = 'sine') {
            if (!audioContext) return;
            
            try {
                let now = audioContext.currentTime;
                let osc = audioContext.createOscillator();
                let gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.value = frequency;
                osc.type = type;
                
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                
                osc.start(now);
                osc.stop(now + duration);
            } catch (e) {
                console.log('Audio error:', e);
            }
        }

        function playRadarSound() { playSound(800, 0.1); }
        function playFireSound() { playSound(1200, 0.15); }
        function playHitSound() { playSound(1500, 0.08); }
        function playKillSound() { playSound(2000, 0.25, 'square'); }
        function playExplosionSound() { playSound(400, 0.4, 'square'); }
        function playGameOverSound() { playSound(200, 0.6); }

        // Event listeners
        canvas.addEventListener('click', handleRadarClick);
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                togglePause();
            }
            if (e.key.toLowerCase() === 'r') {
                location.reload();
            }
        });

        // Game loop
        function gameLoop() {
            update();
            requestAnimationFrame(gameLoop);
        }

        // Inicio del juego
        window.addEventListener('load', () => {
            initAudio();
            spawnWave();
            
            setInterval(spawnWave, 6000);
            
            gameLoop();
        });
    </script>
</body>
</html>
